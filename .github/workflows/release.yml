name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download PawnIO
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path sensor-helper/vendor | Out-Null
          Invoke-WebRequest `
            -Uri 'https://github.com/namazso/PawnIO.Setup/releases/download/2.1.0/PawnIO_setup.exe' `
            -OutFile 'sensor-helper/vendor/PawnIO_setup.exe'

      - name: Restore sensor helper
        run: dotnet restore sensor-helper/FixTemp.Sensors.csproj -r win-x64

      - name: Build web app
        run: pnpm build

      - name: Publish sensor helper
        run: dotnet publish sensor-helper/FixTemp.Sensors.csproj -c Release -r win-x64 --self-contained true -o sensor-helper/publish/win-x64 --no-restore

      - name: Copy sensor assets
        run: node sensor-helper/copy-assets.mjs

      - name: Bundle local server
        run: pnpm bundle:server

      - name: Build Windows installer
        run: pnpm exec electron-builder --win nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fixtemp-windows-installer
          path: |
            release/FixTemp-Setup-*.exe
            release/FixTemp-Setup-*.exe.blockmap
            release/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/FixTemp-Setup-*.exe
            release/FixTemp-Setup-*.exe.blockmap
            release/latest.yml
          generate_release_notes: true
